version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
  build:
    commands:
      - npm install
      # npm run build runs sam build; swagger.yaml is bundled via esbuild Loader (see template.yaml).
      - npm run build
      - sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
artifacts:
  files:
    - '**/*'