AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SENG2021-GoosePatrol
  SAM Template for Delivery Document Exchange API (uses existing DynamoDB tables)

Parameters:
  ClientsTableName:
    Type: String
    Default: Clients
    Description: Name of the existing Clients DynamoDB table
  SessionsTableName:
    Type: String
    Default: Sessions
    Description: Name of the existing Sessions DynamoDB table
  DocumentsTableName:
    Type: String
    Default: DespatchAdvices
    Description: Name of the existing documents/despatch DynamoDB table

Globals:
  Function:
    Timeout: 3
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Resources: #add more routes here using this format
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.lambdaHandler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        RegisterClient:
          Type: Api
          Properties:
            Path: /clients
            Method: post
        CreateSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: post
        DeleteSession:
          Type: Api
          Properties:
            Path: /sessions/{sessionId}
            Method: delete
        CreateDespatch:
          Type: Api
          Properties:
            Path: /despatch-advice
            Method: post
      Environment:
        Variables:
          TABLE_NAME: !Ref DocumentsTableName
          CLIENTS_TABLE_NAME: !Ref ClientsTableName
          SESSIONS_TABLE_NAME: !Ref SessionsTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ClientsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - src/handler.ts

# ReceiptAdvices table (created if it doesn't already exist)
  ReceiptAdvicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref ReceiptAdvicesTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receiptAdviceId
          AttributeType: S
        - AttributeName: despatchAdviceId
          AttributeType: S
        - AttributeName: submitterId
          AttributeType: S
      KeySchema:
        - AttributeName: receiptAdviceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: despatch-advice-index
          KeySchema:
            - AttributeName: despatchAdviceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: submitter-index
          KeySchema:
            - AttributeName: submitterId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
 
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  ApiFunctionArn:
    Description: API Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
  ClientsTableName:
    Description: Clients DynamoDB table in use
    Value: !Ref ClientsTableName
  SessionsTableName:
    Description: Sessions DynamoDB table in use
    Value: !Ref SessionsTableName
  DocumentsTableName:
    Description: DespatchAdvices DynamoDB table in use
    Value: !Ref DocumentsTableName
  ReceiptAdvicesTableName:
    Description: ReceiptAdvices DynamoDB table in use
    Value: !Ref ReceiptAdvicesTableName