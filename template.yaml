AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SENG2021-GoosePatrol
  SAM Template for Delivery Document Exchange API (uses existing DynamoDB tables)

Parameters:
  ClientsTableName:
    Type: String
    Default: Clients
    Description: Name of the existing Clients DynamoDB table
  SessionsTableName:
    Type: String
    Default: Sessions
    Description: Name of the existing Sessions DynamoDB table
  DocumentsTableName:
    Type: String
    Default: DespatchAdvices
    Description: Name of the existing documents/despatch DynamoDB table

Globals:
  Function:
    Timeout: 3
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Resources: #add more routes here using this format
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.lambdaHandler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        RegisterClient:
          Type: Api
          Properties:
            Path: /clients
            Method: post
        CreateSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: post
        DeleteSession:
          Type: Api
          Properties:
            Path: /sessions/{sessionId}
            Method: delete
        CreateDespatch:
          Type: Api
          Properties:
            Path: /despatch-advice
            Method: post
        CancelFulfilment:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}/fulfilment-cancellation
            Method: post
      Environment:
        Variables:
          TABLE_NAME: !Ref DocumentsTableName
          CLIENTS_TABLE_NAME: !Ref ClientsTableName
          SESSIONS_TABLE_NAME: !Ref SessionsTableName
          DESPATCH_ADVICES_TABLE_NAME: !Ref DocumentsTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ClientsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - handler.ts

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StackfeedDocuments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: documentType
          AttributeType: S
      KeySchema:
        - AttributeName: documentId
          KeyType: HASH
        - AttributeName: documentType
          KeyType: RANGE

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  ApiFunctionArn:
    Description: API Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
  ClientsTableName:
    Description: Clients DynamoDB table in use
    Value: !Ref ClientsTableName
  SessionsTableName:
    Description: Sessions DynamoDB table in use
    Value: !Ref SessionsTableName
  DocumentsTableName:
    Description: Documents DynamoDB table in use
    Value: !Ref DocumentsTableName