AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SENG2021-GoosePatrol
  SAM Template for Delivery Document Exchange API (uses existing DynamoDB tables)

Parameters:
  ClientsTableName:
    Type: String
    Default: Clients
    Description: Name of the existing Clients DynamoDB table
  SessionsTableName:
    Type: String
    Default: Sessions
    Description: Name of the existing Sessions DynamoDB table
  DocumentsTableName:
    Type: String
    Default: DespatchAdvices
    Description: Name of the existing documents/despatch DynamoDB table
  ReceiptAdvicesTableName:
    Type: String
    Default: ReceiptAdvices
    Description: Name of the ReceiptAdvices DynamoDB table

Globals:
  Function:
    Timeout: 3
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambdaHandler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        # Auth routes
        RegisterClient:
          Type: Api
          Properties:
            Path: /clients
            Method: post
        CreateSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: post
        DeleteSession:
          Type: Api
          Properties:
            Path: /sessions/{sessionId}
            Method: delete

        # DespatchAdvice routes
        ListDespatchAdvices:
          Type: Api
          Properties:
            Path: /despatch-advices
            Method: get
        CreateDespatchAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices
            Method: post
        CancelFulfilment:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchAdviceId}/fulfilment-cancellation
            Method: post

        # ReceiptAdvice routes
        CreateReceiptAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchAdviceId}/receipt-advices
            Method: post

      Environment:
        Variables:
          TABLE_NAME: !Ref DocumentsTableName
          CLIENTS_TABLE_NAME: !Ref ClientsTableName
          SESSIONS_TABLE_NAME: !Ref SessionsTableName
          DESPATCH_TABLE_NAME: !Ref DocumentsTableName
          RECEIPT_TABLE_NAME: !Ref ReceiptAdvicesTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ClientsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptAdvicesTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - handler.ts

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  ApiFunctionArn:
    Description: API Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
  ClientsTableName:
    Description: Clients DynamoDB table in use
    Value: !Ref ClientsTableName
  SessionsTableName:
    Description: Sessions DynamoDB table in use
    Value: !Ref SessionsTableName
  DocumentsTableName:
    Description: DespatchAdvices DynamoDB table in use
    Value: !Ref DocumentsTableName
  ReceiptAdvicesTableName:
    Description: ReceiptAdvices DynamoDB table in use
    Value: !Ref ReceiptAdvicesTableName