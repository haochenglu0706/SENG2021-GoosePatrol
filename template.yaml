AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  SENG2021-GoosePatrol
  SAM Template for Delivery Document Exchange API (uses existing DynamoDB tables)

Parameters:
  ClientsTableName:
    Type: String
    Default: Clients
    Description: Name of the existing Clients DynamoDB table
  SessionsTableName:
    Type: String
    Default: Sessions
    Description: Name of the existing Sessions DynamoDB table
  DocumentsTableName:
    Type: String
    Default: DespatchAdvices
    Description: Name of the existing documents/despatch DynamoDB table
  ReceiptAdvicesTableName:
    Type: String
    Default: ReceiptAdvices
    Description: Name of the existing ReceiptAdvices DynamoDB table

Globals:
  Function:
    Timeout: 3
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,sessionId'"
      AllowOrigin: "'*'"

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambdaHandler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        # Auth routes
        RegisterClient:
          Type: Api
          Properties:
            Path: /clients
            Method: post
        ListClients:
          Type: Api
          Properties:
            Path: /clients
            Method: get
        CreateSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: post
        DeleteSession:
          Type: Api
          Properties:
            Path: /sessions/{sessionId}
            Method: delete
        GetClientIdByUsername:
          Type: Api
          Properties:
            Path: /clients/{username}/client-id
            Method: get

        # DespatchAdvice routes
        ListDespatchAdvices:
          Type: Api
          Properties:
            Path: /despatch-advices
            Method: get
        CreateDespatchAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices
            Method: post
        GetDespatchAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}
            Method: get
        GetDespatchAdviceUbl:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}/ubl
            Method: get
        UpdateDespatchAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}
            Method: put
        DeleteDespatchAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}
            Method: delete
        CancelFulfilment:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}/fulfilment-cancellation
            Method: post
        #ReceiptAdvice routes
        ListReceiptAdvices:
          Type: Api
          Properties:
            Path: /receipt-advices
            Method: get
        getReceiptAdvice:
          Type: Api
          Properties:
            Path: /receipt-advices/{receiptAdviceId}
            Method: get
        GetReceiptAdviceUbl:
          Type: Api
          Properties:
            Path: /receipt-advices/{receiptAdviceId}/ubl
            Method: get
        CreateReceiptAdvice:
          Type: Api
          Properties:
            Path: /despatch-advices/{despatchId}/receipt-advices
            Method: post
        # documentation and other 
        GetHealth:
          Type: Api
          Properties:
            Path: /health
            Method: get

        GetDocs:
          Type: Api
          Properties:
            Path: /docs
            Method: get

        GetSwaggerYaml:
          Type: Api
          Properties:
            Path: /swagger.yaml
            Method: get
        OptionsSwaggerYaml:
          Type: Api
          Properties:
            Path: /swagger.yaml
            Method: options
        OptionsAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: options
            
      Environment:
        Variables:
          TABLE_NAME: !Ref DocumentsTableName
          CLIENTS_TABLE_NAME: !Ref ClientsTableName
          SESSIONS_TABLE_NAME: !Ref SessionsTableName
          DESPATCH_ADVICES_TABLE_NAME: !Ref DocumentsTableName
          RECEIPT_ADVICES_TABLE_NAME: !Ref ReceiptAdvicesTableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ClientsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref ReceiptAdvicesTableName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        # Bundle repo-root swagger.yaml as a string (no post-build cp needed)
        Loader:
          - .yaml=text
        EntryPoints:
          - handler.ts

  # ReceiptAdvices table — stores receipt advice documents linked to despatch advices.
  # receiptAdviceId is the partition key.
  # GSIs support lookup by despatchAdviceId and by submitterId.
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StackfeedDocuments
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true #Encrypts the dynamoDB
      AttributeDefinitions:
        - AttributeName: receiptAdviceId
          AttributeType: S
        - AttributeName: despatchAdviceId
          AttributeType: S
        - AttributeName: submitterId
          AttributeType: S
      KeySchema:
        - AttributeName: receiptAdviceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: despatch-advice-index
          KeySchema:
            - AttributeName: despatchAdviceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: submitter-index
          KeySchema:
            - AttributeName: submitterId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/"
  ApiFunctionArn:
    Description: API Lambda Function ARN
    Value: !GetAtt ApiFunction.Arn
  ClientsTableName:
    Description: Clients DynamoDB table in use
    Value: !Ref ClientsTableName
  SessionsTableName:
    Description: Sessions DynamoDB table in use
    Value: !Ref SessionsTableName
  DocumentsTableName:
    Description: DespatchAdvices DynamoDB table in use
    Value: !Ref DocumentsTableName
  ReceiptAdvicesTableName:
    Description: ReceiptAdvices DynamoDB table in use
    Value: !Ref ReceiptAdvicesTableName
