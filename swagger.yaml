openapi: 3.0.3
info:
  title: Despatch & Order Management API
  description: API for managing clients, sessions, despatch advices, order changes, order cancellations, and fulfilment cancellations.
  version: 1.0.0
servers:
  - url: https://e6kttv9em1.execute-api.ap-southeast-2.amazonaws.com/Prod/
tags:
  - name: Auth
    description: Client registration and session management
    x-subtitle: version1
  - name: DespatchAdvice
    description: Despatch advice document operations
    x-subtitle: version1
  - name: ReceiptAdvice
    description: Receipt advice document operations
    x-subtitle: version1
  - name: Health
    description: Health check endpoint
    x-subtitle: version1
paths:
  /clients:
    post:
      tags:
        - Auth
      summary: Register a new client
      x-subtitle: version1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - email
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: StrongPassw0rd!
                email:
                  type: string
                  example: johndoe@example.com
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
              examples:
                clientExample:
                  value:
                    clientId: "c12345"
                    username: johndoe
                    password: "StrongPassw0rd!"
        '400':
          $ref: '#/components/responses/BadRequest'
  /sessions:
    post:
      tags:
        - Auth
      summary: Create a new session (login)
      x-subtitle: version1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - email
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: StrongPassw0rd!
                email:
                  type: string
                  example: johndoe@example.com
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
              examples:
                sessionExample:
                  value:
                    sessionId: "s98765"
                    clientId: "c12345"
        '401':
          $ref: '#/components/responses/Unauthorized'
  /sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: Delete a session (logout)
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '204':
          description: Session deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /despatch-advices:
    get:
      tags:
        - DespatchAdvice
      summary: List all despatch advices
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of despatch advices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DespatchAdvice'
              examples:
                despatchAdvicesExample:
                  value:
                    - uuid: "123e4567-e89b-12d3-a456-426614174000"
                      documentID: "DA-001"
                      senderId: "SupplierA"
                      receiverId: "CustomerB"
                      copyIndicator: false
                      issueDate: "2024-05-01"
                      documentStatusCode: "Active"
                      orderReference:
                        orderId: "ORD-1001"
                        orderDate: "2024-04-30"
                      despatchAdviceTypeCode: "delivery"
                      note: "First despatch advice"
                      despatchSupplierParty:
                        partyId: "SupplierA"
                        partyName: "Supplier A Ltd"
                      deliveryCustomerParty:
                        partyId: "CustomerB"
                        partyName: "Customer B Inc"
                      shipment:
                        shipmentId: "SHIP-001"
                        shipmentDate: "2024-05-02"
                      despatchLines:
                        - lineId: "line1"
                          quantity: 10
                      status: "DESPATCHED"
    post:
      tags:
        - DespatchAdvice
      summary: Create a new despatch advice
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdviceCreateRequest'
            examples:
              createDespatchAdviceExample:
                value:
                  documentID: "DA-002"
                  senderId: "SupplierA"
                  receiverId: "CustomerB"
                  copyIndicator: false
                  issueDate: "2024-06-01"
                  documentStatusCode: "Active"
                  orderReference:
                    orderId: "ORD-1002"
                    orderDate: "2024-05-30"
                  despatchAdviceTypeCode: "delivery"
                  note: "Second despatch advice"
                  despatchSupplierParty:
                    partyId: "SupplierA"
                    partyName: "Supplier A Ltd"
                  deliveryCustomerParty:
                    partyId: "CustomerB"
                    partyName: "Customer B Inc"
                  shipment:
                    shipmentId: "SHIP-002"
                    shipmentDate: "2024-06-02"
                  despatchLines:
                    - lineId: "line1"
                      quantity: 20
      responses:
        '201':
          description: Despatch advice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '400':
          $ref: '#/components/responses/BadRequest'
  /despatch-advices/{despatchId}:
    get:
      tags:
        - DespatchAdvice
      summary: Get a despatch advice by document ID
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Despatch advice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - DespatchAdvice
      summary: Update a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdviceCreateRequest'
            examples:
              updateDespatchAdviceExample:
                value:
                  documentID: "DA-001"
                  senderId: "SupplierA"
                  receiverId: "CustomerB"
                  copyIndicator: false
                  issueDate: "2024-05-01"
                  documentStatusCode: "Updated"
                  orderReference:
                    orderId: "ORD-1001"
                    orderDate: "2024-04-30"
                  despatchAdviceTypeCode: "delivery"
                  note: "Updated despatch advice note"
                  despatchSupplierParty:
                    partyId: "SupplierA"
                    partyName: "Supplier A Ltd"
                  deliveryCustomerParty:
                    partyId: "CustomerB"
                    partyName: "Customer B Inc"
                  shipment:
                    shipmentId: "SHIP-001"
                    shipmentDate: "2024-05-02"
                  despatchLines:
                    - lineId: "line1"
                      quantity: 15
      responses:
        '200':
          description: Despatch advice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - DespatchAdvice
      summary: Delete a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Despatch advice deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /despatch-advices/{despatchId}/receipt-advices:
    post:
      tags:
        - ReceiptAdvice
      summary: Delivery party confirms receipt or reports discrepancies.
      operationId: createReceiptAdvice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
            examples:
              receiptAdviceCreateExample:
                value:
                  documentID: "RA-001"
                  senderId: "CustomerB"
                  receiverId: "SupplierA"
                  copyIndicator: false
                  issueDate: "2024-06-05"
                  documentStatusCode: "Active"
                  orderReference:
                    orderId: "ORD-1001"
                    orderDate: "2024-04-30"
                  despatchDocumentReference:
                    documentId: "DA-001"
                    documentType: "DespatchAdvice"
                  deliveryCustomerParty:
                    partyId: "CustomerB"
                    partyName: "Customer B Inc"
                  despatchSupplierParty:
                    partyId: "SupplierA"
                    partyName: "Supplier A Ltd"
                  shipment:
                    shipmentId: "SHIP-001"
                    receiptDate: "2024-06-05"
                  receiptLines:
                    - lineId: "line1"
                      quantityReceived: 10
      responses:
        '200':
          description: Receipt advice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptAdvice'
        '404':
          $ref: '#/components/responses/DespatchAdviceNotFound'
        '409':
          description: Already fully received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /despatch-advices/{despatchId}/fulfilment-cancellation:
    post:
      tags:
        - DespatchAdvice
      summary: Cancel fulfilment for a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        description: Fulfilment cancellation request body
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Customer requested cancellation due to delay"
      responses:
        '200':
          description: Fulfilment cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Fulfilment cancelled successfully"
        '404':
          $ref: '#/components/responses/NotFound'
  /receipt-advices/{receiptAdviceId}:
    get:
      tags:
        - ReceiptAdvice
      summary: Obtain the Receipt Advice document.
      operationId: getReceiptAdviceById
      x-subtitle: version1
      parameters:
        - name: receiptAdviceId
          in: path
          required: true
          schema:
            type: string
          example: RA-001
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Receipt Advice document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptAdvice'
        '404':
          $ref: '#/components/responses/ReceiptAdviceNotFound'
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      x-subtitle: version1
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
  /despatch-advices/{despatchId}/ubl:
    get:
      tags:
        - DespatchAdvice
      summary: Export a despatch advice as UBL XML
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
      responses:
        '200':
          description: UBL DespatchAdvice XML document
          content:
            application/xml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/DespatchAdviceNotFound'
  /receipt-advices/{receiptAdviceId}/ubl:
    get:
      tags:
        - ReceiptAdvice
      summary: Export a receipt advice as UBL XML
      x-subtitle: version1
      parameters:
        - name: receiptAdviceId
          in: path
          required: true
          schema:
            type: string
          example: RA-001
      responses:
        '200':
          description: UBL ReceiptAdvice XML document
          content:
            application/xml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/ReceiptAdviceNotFound'
  /despatch-advices/{despatchId}/fulfilment-cancellation/ubl:
    get:
      tags:
        - DespatchAdvice
      summary: Export fulfilment cancellation as UBL XML
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: DA-001
      responses:
        '200':
          description: UBL FulfilmentCancellation XML document
          content:
            application/xml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: header
      required: true
      schema:
        type: string
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      required:
        - error
        - message
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    ClientRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    Client:
      type: object
      properties:
        clientId:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
    Session:
      type: object
      properties:
        sessionId:
          type: string
        clientId:
          type: string
    DespatchLine:
      type: object
      properties:
        lineId:
          type: string
        quantity:
          type: integer
    DeliveryCustomerParty:
      type: object
      properties:
        partyId:
          type: string
        partyName:
          type: string
    DespatchSupplierParty:
      type: object
      properties:
        partyId:
          type: string
        partyName:
          type: string
    Shipment:
      type: object
      properties:
        shipmentId:
          type: string
        shipmentDate:
          type: string
          format: date
    OrderReference:
      type: object
      properties:
        orderId:
          type: string
        orderDate:
          type: string
          format: date
    DespatchAdviceCreateRequest:
      required:
        - copyIndicator
        - deliveryCustomerParty
        - despatchLines
        - despatchSupplierParty
        - documentID
        - documentStatusCode
        - issueDate
        - orderReference
        - receiverId
        - senderId
        - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchAdviceTypeCode:
          type: string
          default: delivery
        note:
          type: string
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        shipment:
          $ref: '#/components/schemas/Shipment'
        despatchLines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DespatchLine'
    DespatchAdvice:
      allOf:
        - $ref: '#/components/schemas/DespatchAdviceCreateRequest'
        - type: object
          required:
            - status
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - DESPATCHED
                - RECEIVED
                - FULFILMENT_CANCELLED
    ReceiptLine:
      type: object
      properties:
        lineId:
          type: string
        quantityReceived:
          type: integer
    DocumentReference:
      type: object
      properties:
        documentId:
          type: string
        documentType:
          type: string
    ReceiptAdviceShipment:
      type: object
      properties:
        shipmentId:
          type: string
        receiptDate:
          type: string
          format: date
    ReceiptAdviceCreateRequest:
      required:
        - copyIndicator
        - deliveryCustomerParty
        - despatchSupplierParty
        - documentID
        - documentStatusCode
        - orderReference
        - receiptLines
        - receiverId
        - senderId
        - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        note:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchDocumentReference:
          $ref: '#/components/schemas/DocumentReference'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        shipment:
          $ref: '#/components/schemas/ReceiptAdviceShipment'
        receiptLines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReceiptLine'
    ReceiptAdvice:
      allOf:
        - $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
        - type: object
          required:
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequestExample:
              value:
                error: "BadRequest"
                message: "Invalid request parameters"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorizedExample:
              value:
                error: "Unauthorized"
                message: "Invalid username or password"
    DespatchAdviceNotFound:
      description: Despatch Advice not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            despatchNotFoundExample:
              value:
                error: "NotFound"
                message: "Despatch Advice with given ID not found"
    ReceiptAdviceNotFound:
      description: Receipt Advice not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            receiptNotFoundExample:
              value:
                error: "NotFound"
                message: "Receipt Advice with given ID not found"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFoundExample:
              value:
                error: "NotFound"
                message: "Resource not found"