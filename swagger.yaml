openapi: 3.0.3
info:
  title: Despatch & Order Management API
  description: API for managing clients, sessions, despatch advices, order changes, order cancellations, and fulfilment cancellations.
  version: 1.0.0
servers:
  - url: https://e6kttv9em1.execute-api.ap-southeast-2.amazonaws.com/Prod
tags:
  - name: Auth
    description: Client registration and session management
    x-subtitle: version1
  - name: DespatchAdvice
    description: Despatch advice document operations
    x-subtitle: version1
  - name: ReceiptAdvice
    description: Receipt advice document operations
    x-subtitle: version1
  - name: Health
    description: Health check endpoint
    x-subtitle: version1

paths:

  /clients:
    post:
      tags: [Auth]
      summary: Register a new client
      x-subtitle: version1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, email]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: StrongPassw0rd!
                email:
                  type: string
                  example: johndoe@example.com
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
              examples:
                clientExample:
                  value:
                    clientId: "c12345"
                    username: johndoe
                    email: johndoe@example.com
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{username}/client-id:
    get:
      tags: [Auth]
      summary: Get client ID by username
      x-subtitle: version1
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: johndoe
      responses:
        '200':
          description: Client ID found
          content:
            application/json:
              schema:
                type: object
                required: [clientId]
                properties:
                  clientId:
                    type: string
                    example: "c12345"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions:
    post:
      tags: [Auth]
      summary: Create a new session (login)
      x-subtitle: version1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: StrongPassw0rd!
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
              examples:
                sessionExample:
                  value:
                    sessionId: "s98765"
                    clientId: "c12345"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/{sessionId}:
    delete:
      tags: [Auth]
      summary: Delete a session (logout)
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '204':
          description: Session deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /despatch-advices:
    get:
      tags: [DespatchAdvice]
      summary: List all despatch advices
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of despatch advices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DespatchAdvice'

    post:
      tags: [DespatchAdvice]
      summary: Create a new despatch advice
      x-subtitle: version1
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdviceCreateRequest'
            examples:
              createDespatchAdviceExample:
                value:
                  documentID: "DA-002"
                  senderId: "SupplierA"
                  receiverId: "CustomerB"
                  copyIndicator: false
                  issueDate: "2024-06-01"
                  documentStatusCode: "Active"
                  orderReference:
                    id: "ORD-1002"
                  despatchAdviceTypeCode: "delivery"
                  note: "Second despatch advice"
                  despatchSupplierParty:
                    customerAssignedAccountId: "ACC-001"
                    party:
                      name: "Supplier A Ltd"
                      postalAddress:
                        streetName: "1 Warehouse Rd"
                        buildingName: "Supplier HQ"
                        buildingNumber: "1"
                        cityName: "Sydney"
                        postalZone: "2000"
                        addressLine: "Level 1"
                        countryIdentificationCode: "AU"
                      contact:
                        name: "Jane Smith"
                        telephone: "0412345678"
                        telefax: "0298765432"
                        email: "jane@supplierA.com"
                  deliveryCustomerParty:
                    party:
                      name: "Customer B Inc"
                      postalAddress:
                        streetName: "2 Buyer St"
                        cityName: "Sydney"
                        postalZone: "2000"
                        countryIdentificationCode: "AU"
                  shipment:
                    id: "SHIP-002"
                    consignmentId: "CONS-002"
                    delivery:
                      deliveryAddress:
                        streetName: "2 Buyer St"
                        cityName: "Sydney"
                        postalZone: "2000"
                        countryIdentificationCode: "AU"
                      requestedDeliveryPeriod:
                        startDate: "2024-06-01"
                        endDate: "2024-06-30"
                  despatchLines:
                    - id: "LINE-1"
                      deliveredQuantity: 20
                      deliveredQuantityUnitCode: "EA"
                      orderLineReference:
                        lineId: "1"
                        orderReference:
                          id: "ORD-1002"
                      item:
                        name: "Widget"
                        description: "A standard widget"
      responses:
        '201':
          description: Despatch advice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: A despatch advice with the same documentId already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /despatch-advices/{despatchId}:
    get:
      tags: [DespatchAdvice]
      summary: Get a despatch advice by ID
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Despatch advice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [DespatchAdvice]
      summary: Update a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdviceCreateRequest'
      responses:
        '200':
          description: Despatch advice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [DespatchAdvice]
      summary: Delete a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Despatch advice deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /despatch-advices/{despatchId}/ubl:
    get:
      tags: [DespatchAdvice]
      summary: Export a despatch advice as UBL XML
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
      responses:
        '200':
          description: UBL DespatchAdvice XML document
          content:
            application/xml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /despatch-advices/{despatchId}/fulfilment-cancellation:
    post:
      tags: [DespatchAdvice]
      summary: Cancel fulfilment for a despatch advice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Customer requested cancellation due to delay"
      responses:
        '200':
          description: Fulfilment cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "FULFILMENT_CANCELLED"
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already received or already cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /despatch-advices/{despatchId}/receipt-advices:
    post:
      tags: [ReceiptAdvice]
      summary: Delivery party confirms receipt or reports discrepancies
      operationId: createReceiptAdvice
      x-subtitle: version1
      parameters:
        - name: despatchId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
            examples:
              receiptAdviceCreateExample:
                value:
                  documentID: "RA-001"
                  senderId: "CustomerB"
                  receiverId: "SupplierA"
                  copyIndicator: false
                  issueDate: "2024-06-05"
                  documentStatusCode: "RECEIVED"
                  orderReference:
                    id: "ORD-1001"
                  despatchDocumentReference:
                    id: "DA-001"
                  despatchSupplierParty:
                    party:
                      name: "Supplier A Ltd"
                      postalAddress:
                        streetName: "1 Warehouse Rd"
                        cityName: "Sydney"
                        postalZone: "2000"
                        countryIdentificationCode: "AU"
                  deliveryCustomerParty:
                    party:
                      name: "Customer B Inc"
                      postalAddress:
                        streetName: "2 Buyer St"
                        cityName: "Sydney"
                        postalZone: "2000"
                        countryIdentificationCode: "AU"
                  shipment:
                    id: "SHIP-001"
                    consignmentId: "CONS-001"
                    delivery: {}
                  receiptLines:
                    - id: "LINE-1"
                      receivedQuantity: 10
                      receivedQuantityUnitCode: "EA"
                      item:
                        name: "Widget"
                        description: "A standard widget"
      responses:
        '200':
          description: Receipt advice created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  receiptAdviceId:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already fully received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /receipt-advices/{receiptAdviceId}:
    get:
      tags: [ReceiptAdvice]
      summary: Obtain the Receipt Advice document
      operationId: getReceiptAdviceById
      x-subtitle: version1
      parameters:
        - name: receiptAdviceId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Receipt Advice document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptAdvice'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already fully received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /receipt-advices/{receiptAdviceId}/ubl:
    get:
      tags: [ReceiptAdvice]
      summary: Export a receipt advice as UBL XML
      x-subtitle: version1
      parameters:
        - name: receiptAdviceId
          in: path
          required: true
          schema:
            type: string
          example: "abc-123"
      responses:
        '200':
          description: UBL ReceiptAdvice XML document
          content:
            application/xml:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      x-subtitle: version1
      responses:
        '200':
          description: Service is healthy
          content:
            text/html:
              schema:
                type: string

components:

  parameters:
    SessionId:
      name: sessionId
      in: header
      required: true
      schema:
        type: string
      example: "1b8b79d9-cb5f-44ea-9fb0-4cf5d9642a12"
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string

  schemas:

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: "BadRequest"
        message:
          type: string
          example: "Invalid request parameters"

    Client:
      type: object
      properties:
        clientId:
          type: string
        username:
          type: string
        email:
          type: string

    Session:
      type: object
      properties:
        sessionId:
          type: string
        clientId:
          type: string

    PostalAddress:
      type: object
      required:
        - streetName
        - cityName
        - postalZone
        - countryIdentificationCode
      properties:
        streetName:
          type: string
          example: "1 Warehouse Rd"
        buildingName:
          type: string
          example: "Supplier HQ"
        buildingNumber:
          type: string
          example: "1"
        cityName:
          type: string
          example: "Sydney"
        postalZone:
          type: string
          example: "2000"
        countrySubentity:
          type: string
          example: "NSW"
        addressLine:
          type: string
          example: "Level 1"
        countryIdentificationCode:
          type: string
          minLength: 2
          maxLength: 2
          example: "AU"

    Contact:
      type: object
      properties:
        name:
          type: string
          example: "Jane Smith"
        telephone:
          type: string
          example: "0412345678"
        telefax:
          type: string
          example: "0298765432"
        email:
          type: string
          format: email
          example: "jane@supplierA.com"

    Party:
      type: object
      required: [name, postalAddress]
      properties:
        name:
          type: string
          example: "Supplier A Ltd"
        postalAddress:
          $ref: '#/components/schemas/PostalAddress'
        contact:
          $ref: '#/components/schemas/Contact'

    DespatchSupplierParty:
      type: object
      required: [party]
      properties:
        customerAssignedAccountId:
          type: string
          example: "ACC-001"
        party:
          $ref: '#/components/schemas/Party'

    DeliveryCustomerParty:
      type: object
      required: [party]
      properties:
        customerAssignedAccountId:
          type: string
        supplierAssignedAccountId:
          type: string
        party:
          $ref: '#/components/schemas/Party'

    OrderReference:
      type: object
      required: [id]
      properties:
        id:
          type: string
          example: "ORD-1002"
        salesOrderId:
          type: string
        uuid:
          type: string
          format: uuid
        issueDate:
          type: string
          format: date

    OrderLineReference:
      type: object
      required: [lineId, orderReference]
      properties:
        lineId:
          type: string
          example: "1"
        salesOrderLineId:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'

    ItemIdentification:
      type: object
      properties:
        id:
          type: string

    LotIdentification:
      type: object
      properties:
        lotNumberId:
          type: string
        expiryDate:
          type: string
          format: date

    ItemInstance:
      type: object
      properties:
        lotIdentification:
          $ref: '#/components/schemas/LotIdentification'

    Item:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          example: "Widget"
        description:
          type: string
          example: "A standard widget"
        buyersItemIdentification:
          $ref: '#/components/schemas/ItemIdentification'
        sellersItemIdentification:
          $ref: '#/components/schemas/ItemIdentification'
        itemInstance:
          $ref: '#/components/schemas/ItemInstance'

    DespatchLine:
      type: object
      required: [id, deliveredQuantity, deliveredQuantityUnitCode, orderLineReference, item]
      properties:
        id:
          type: string
          example: "LINE-1"
        note:
          type: string
        lineStatusCode:
          type: string
        deliveredQuantity:
          type: number
          example: 20
        deliveredQuantityUnitCode:
          type: string
          example: "EA"
        backorderQuantity:
          type: number
        backorderQuantityUnitCode:
          type: string
        backorderReason:
          type: string
        orderLineReference:
          $ref: '#/components/schemas/OrderLineReference'
        item:
          $ref: '#/components/schemas/Item'

    DeliveryPeriod:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
          example: "2024-06-01"
        startTime:
          type: string
          example: "09:00:00"
        endDate:
          type: string
          format: date
          example: "2024-06-30"
        endTime:
          type: string
          example: "17:00:00"

    Delivery:
      type: object
      required: [deliveryAddress, requestedDeliveryPeriod]
      properties:
        id:
          type: string
        deliveryAddress:
          $ref: '#/components/schemas/PostalAddress'
        requestedDeliveryPeriod:
          $ref: '#/components/schemas/DeliveryPeriod'

    Shipment:
      type: object
      required: [id, consignmentId, delivery]
      properties:
        id:
          type: string
          example: "SHIP-002"
        consignmentId:
          type: string
          example: "CONS-002"
        delivery:
          $ref: '#/components/schemas/Delivery'

    AdditionalDocumentReference:
      type: object
      required: [id, documentType]
      properties:
        id:
          type: string
        documentType:
          type: string

    DespatchAdviceCreateRequest:
      type: object
      required:
        - documentID
        - senderId
        - receiverId
        - copyIndicator
        - issueDate
        - documentStatusCode
        - orderReference
        - despatchSupplierParty
        - deliveryCustomerParty
        - shipment
        - despatchLines
      properties:
        documentID:
          type: string
          example: "DA-002"
        senderId:
          type: string
          example: "SupplierA"
        receiverId:
          type: string
          example: "CustomerB"
        copyIndicator:
          type: boolean
          example: false
        replaces:
          type: string
        issueDate:
          type: string
          format: date
          example: "2024-06-01"
        documentStatusCode:
          type: string
          example: "Active"
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchAdviceTypeCode:
          type: string
          default: "delivery"
          example: "delivery"
        note:
          type: string
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        shipment:
          $ref: '#/components/schemas/Shipment'
        despatchLines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DespatchLine'
        additionalDocumentReference:
          oneOf:
            - $ref: '#/components/schemas/AdditionalDocumentReference'
            - type: array
              items:
                $ref: '#/components/schemas/AdditionalDocumentReference'

    DespatchAdvice:
      allOf:
        - $ref: '#/components/schemas/DespatchAdviceCreateRequest'
        - type: object
          required: [despatchAdviceId, status]
          properties:
            despatchAdviceId:
              type: string
              format: uuid
              example: "f3a2b1c4-1234-4abc-8def-000000000001"
            status:
              type: string
              enum: [draft, DESPATCHED, RECEIVED, FULFILMENT_CANCELLED]
              example: "draft"

    DocumentReference:
      type: object
      required: [id]
      properties:
        id:
          type: string
          example: "DA-001"
        uuid:
          type: string
          format: uuid
        issueDate:
          type: string
          format: date

    ReceiptLine:
      type: object
      required: [id, receivedQuantity, receivedQuantityUnitCode, item]
      properties:
        id:
          type: string
          example: "LINE-1"
        note:
          type: string
        receivedQuantity:
          type: number
          example: 10
        receivedQuantityUnitCode:
          type: string
          example: "EA"
        shortQuantity:
          type: number
          example: 2
        shortQuantityUnitCode:
          type: string
          example: "EA"
        item:
          $ref: '#/components/schemas/Item'

    ReceiptDelivery:
      type: object
      properties:
        id:
          type: string
        quantity:
          type: number
        quantityUnitCode:
          type: string
        actualDeliveryDate:
          type: string
          format: date
        actualDeliveryTime:
          type: string
        requestedDeliveryPeriod:
          $ref: '#/components/schemas/DeliveryPeriod'

    ReceiptShipment:
      type: object
      required: [id, consignmentId]
      properties:
        id:
          type: string
          example: "SHIP-001"
        consignmentId:
          type: string
          example: "CONS-001"
        delivery:
          $ref: '#/components/schemas/ReceiptDelivery'

    ReceiptAdviceCreateRequest:
      type: object
      required:
        - documentID
        - senderId
        - receiverId
        - copyIndicator
        - documentStatusCode
        - orderReference
        - despatchSupplierParty
        - deliveryCustomerParty
        - shipment
        - receiptLines
      properties:
        documentID:
          type: string
          example: "RA-001"
        senderId:
          type: string
          example: "CustomerB"
        receiverId:
          type: string
          example: "SupplierA"
        copyIndicator:
          type: boolean
          example: false
        replaces:
          type: string
        issueDate:
          type: string
          format: date
          example: "2024-06-05"
        documentStatusCode:
          type: string
          example: "RECEIVED"
        note:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchDocumentReference:
          $ref: '#/components/schemas/DocumentReference'
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        shipment:
          $ref: '#/components/schemas/ReceiptShipment'
        receiptLines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReceiptLine'

    ReceiptAdvice:
      allOf:
        - $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
        - type: object
          required: [receiptAdviceId]
          properties:
            receiptAdviceId:
              type: string
              format: uuid
            despatchAdviceId:
              type: string
              format: uuid

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badRequestExample:
              value:
                error: "BadRequest"
                message: "Invalid request parameters"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorizedExample:
              value:
                error: "Unauthorized"
                message: "Invalid username or password"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
