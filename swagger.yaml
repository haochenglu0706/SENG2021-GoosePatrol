openapi: 3.0.3
info:
  title: Despatch & Order Management API
  description: "API for managing clients, sessions, despatch advices, order changes, order cancellations, and fulfilment cancellations."
  version: 1.0.0
servers:
- url: https://h49mycoe4e.execute-api.ap-southeast-2.amazonaws.com/Prod
tags:
- name: Auth
  description: Client registration and session management
  x-subtitle: version1
- name: DespatchAdvice
  description: Despatch advice document operations
  x-subtitle: version1
- name: ReceiptAdvice
  description: Receipt advice document operations
  x-subtitle: version1
- name: Health
  description: Health check endpoint
  x-subtitle: version1
paths:
  /clients:
    post:
      tags:
      - Auth
      summary: Register a new client
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
        required: true
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          $ref: "#/components/responses/BadRequest"
      x-subtitle: version1
  /sessions:
    post:
      tags:
      - Auth
      summary: Create a new session (login)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/sessions_body"
        required: true
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"
      x-subtitle: version1
  /sessions/{sessionId}:
    delete:
      tags:
      - Auth
      summary: Delete a session (logout)
      parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Session deleted
        "404":
          $ref: "#/components/responses/NotFound"
      x-subtitle: version1
  /despatch-advices:
    get:
      tags:
      - DespatchAdvice
      summary: List all despatch advices
      parameters:
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of despatch advices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DespatchAdvice"
      x-subtitle: version1
    post:
      tags:
      - DespatchAdvice
      summary: Create a new despatch advice
      parameters:
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DespatchAdviceCreateRequest"
        required: true
      responses:
        "201":
          description: Despatch advice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DespatchAdvice"
        "400":
          $ref: "#/components/responses/BadRequest"
      x-subtitle: version1
  /despatch-advices/{despatchId}:
    get:
      tags:
      - DespatchAdvice
      summary: Get a despatch advice by document ID
      parameters:
      - name: despatchId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Despatch advice found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DespatchAdvice"
        "404":
          $ref: "#/components/responses/NotFound"
      x-subtitle: version1
    put:
      tags:
      - DespatchAdvice
      summary: Update a despatch advice
      parameters:
      - name: despatchId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DespatchAdviceCreateRequest"
        required: true
      responses:
        "200":
          description: Despatch advice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DespatchAdvice"
        "404":
          $ref: "#/components/responses/NotFound"
      x-subtitle: version1
    delete:
      tags:
      - DespatchAdvice
      summary: Delete a despatch advice
      parameters:
      - name: despatchId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Despatch advice deleted
        "404":
          $ref: "#/components/responses/NotFound"
      x-subtitle: version1
  /despatch-advices/{despatchId}/receipt-advices:
    post:
      tags:
      - ReceiptAdvice
      summary: Delivery party confirms receipt or reports discrepancies.
      operationId: createReceiptAdvice
      parameters:
      - name: despatchId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptAdviceCreateRequest"
        required: true
      responses:
        "200":
          description: Receipt advice created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptAdvice"
        "404":
          $ref: "#/components/responses/DespatchAdviceNotFound"
        "409":
          description: Already fully received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-subtitle: version1
  /despatch-advices/{despatchId}/fulfilment-cancellation:
    post:
      tags:
      - DespatchAdvice
      summary: Cancel fulfilment for a despatch advice
      parameters:
      - name: despatchId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      requestBody:
        description: Fulfilment cancellation request body
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/despatchId_fulfilmentcancellation_body"
        required: true
      responses:
        "200":
          description: Fulfilment cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "404":
          $ref: "#/components/responses/NotFound"
      x-subtitle: version1
  /receipt-advices/{receiptAdviceId}:
    get:
      tags:
      - ReceiptAdvice
      summary: Obtain the Receipt Advice document.
      operationId: getReceiptAdviceById
      parameters:
      - name: receiptAdviceId
        in: path
        required: true
        schema:
          type: string
      - name: sessionId
        in: header
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Receipt Advice document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptAdvice"
        "404":
          $ref: "#/components/responses/ReceiptAdviceNotFound"
      x-subtitle: version1
  /health:
    get:
      tags:
      - Health
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
      x-subtitle: version1
components:
  schemas:
    ErrorResponse:
      required:
      - error
      - message
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    ClientRequest:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    Client:
      type: object
      properties:
        clientId:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
    Session:
      type: object
      properties:
        sessionId:
          type: string
        clientId:
          type: string
    DespatchLine:
      type: object
      properties:
        lineId:
          type: string
        quantity:
          type: integer
    DeliveryCustomerParty:
      type: object
      properties:
        partyId:
          type: string
        partyName:
          type: string
    DespatchSupplierParty:
      type: object
      properties:
        partyId:
          type: string
        partyName:
          type: string
    Shipment:
      type: object
      properties:
        shipmentId:
          type: string
        shipmentDate:
          type: string
          format: date
    OrderReference:
      type: object
      properties:
        orderId:
          type: string
        orderDate:
          type: string
          format: date
    DespatchAdviceCreateRequest:
      required:
      - copyIndicator
      - deliveryCustomerParty
      - despatchLines
      - despatchSupplierParty
      - documentID
      - documentStatusCode
      - issueDate
      - orderReference
      - receiverId
      - senderId
      - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        orderReference:
          $ref: "#/components/schemas/OrderReference"
        despatchAdviceTypeCode:
          type: string
          default: delivery
        note:
          type: string
        despatchSupplierParty:
          $ref: "#/components/schemas/DespatchSupplierParty"
        deliveryCustomerParty:
          $ref: "#/components/schemas/DeliveryCustomerParty"
        shipment:
          $ref: "#/components/schemas/Shipment"
        despatchLines:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/DespatchLine"
    DespatchAdvice:
      allOf:
      - $ref: "#/components/schemas/DespatchAdviceCreateRequest"
      - required:
        - status
        - uuid
        type: object
        properties:
          uuid:
            type: string
            format: uuid
          status:
            type: string
            enum:
            - DESPATCHED
            - RECEIVED
            - FULFILMENT_CANCELLED
    ReceiptLine:
      type: object
      properties:
        lineId:
          type: string
        quantityReceived:
          type: integer
    DocumentReference:
      type: object
      properties:
        documentId:
          type: string
        documentType:
          type: string
    ReceiptAdviceShipment:
      type: object
      properties:
        shipmentId:
          type: string
        receiptDate:
          type: string
          format: date
    ReceiptAdviceCreateRequest:
      required:
      - copyIndicator
      - deliveryCustomerParty
      - despatchSupplierParty
      - documentID
      - documentStatusCode
      - orderReference
      - receiptLines
      - receiverId
      - senderId
      - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        note:
          type: string
        orderReference:
          $ref: "#/components/schemas/OrderReference"
        despatchDocumentReference:
          $ref: "#/components/schemas/DocumentReference"
        deliveryCustomerParty:
          $ref: "#/components/schemas/DeliveryCustomerParty"
        despatchSupplierParty:
          $ref: "#/components/schemas/DespatchSupplierParty"
        shipment:
          $ref: "#/components/schemas/ReceiptAdviceShipment"
        receiptLines:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/ReceiptLine"
    ReceiptAdvice:
      allOf:
      - $ref: "#/components/schemas/ReceiptAdviceCreateRequest"
      - required:
        - uuid
        type: object
        properties:
          uuid:
            type: string
            format: uuid
    sessions_body:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    despatchId_fulfilmentcancellation_body:
      type: object
      properties:
        documentId:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - DESPATCHED
            - RECEIVED
            - FULFILMENT_CANCELLED
        issueDate:
          type: string
          format: date
        senderId:
          type: string
        receiverId:
        reason:
          type: string
    inline_response_200:
      type: object
      properties:
        message:
          type: string
    inline_response_200_1:
      type: object
      properties:
        status:
          type: string
          example: healthy
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DespatchAdviceNotFound:
      description: Despatch Advice not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ReceiptAdviceNotFound:
      description: Receipt Advice not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: header
      required: true
      schema:
        type: string
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string