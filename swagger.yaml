openapi: 3.0.3
info:
  title: Despatch & Order Management API
  description: API for managing clients, sessions, despatch advices, order changes, order cancellations, and fulfilment cancellations.
  version: 1.0.0
servers:
  - url: https://h49mycoe4e.execute-api.ap-southeast-2.amazonaws.com/Prod
tags:
  - name: Auth
    description: Client registration and session management
  - name: DespatchAdvice
    description: Despatch advice document operations
  - name: OrderChange
    description: Order change operations
  - name: OrderCancellation
    description: Order cancellation operations
  - name: FulfilmentCancellation
    description: Fulfilment cancellation operations
  - name: ReceiptAdvice
    description: Receipt advice document operations
paths:
  /clients:
    post:
      tags:
        - Auth
      summary: Register a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
  /clients/{clientId}:
    get:
      tags:
        - Auth
      summary: Get a client by ID
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'
  /sessions:
    post:
      tags:
        - Auth
      summary: Create a new session (login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: Delete a session (logout)
      parameters:
        - $ref: '#/components/parameters/SessionIdPath'
      responses:
        '204':
          description: Session deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /despatch-advices:
    get:
      tags:
        - DespatchAdvice
      summary: List all despatch advices
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of despatch advices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DespatchAdvice'
    post:
      tags:
        - DespatchAdvice
      summary: Create a new despatch advice
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdvice'
      responses:
        '201':
          description: Despatch advice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '400':
          $ref: '#/components/responses/BadRequest'
  /despatch-advices/{documentId}:
    get:
      tags:
        - DespatchAdvice
      summary: Get a despatch advice by document ID
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Despatch advice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - DespatchAdvice
      summary: Update a despatch advice
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DespatchAdvice'
      responses:
        '200':
          description: Despatch advice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DespatchAdvice'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - DespatchAdvice
      summary: Delete a despatch advice
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Despatch advice deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /despatch-advices/{despatchAdviceId}/receipt-advices:
    post:
      tags:
        - ReceiptAdvice
      summary: Delivery party confirms receipt or reports discrepancies.
      operationId: createReceiptAdvice
      parameters:
        - name: despatchAdviceId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
      responses:
        '200':
          description: Receipt advice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200_3'
        '404':
          $ref: '#/components/responses/DespatchAdviceNotFound'
        '409':
          description: Already fully received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /receipt-advices/{receiptAdviceId}:
    get:
      tags:
        - ReceiptAdvice
      summary: Obtain the Receipt Advice document.
      operationId: getReceiptAdviceById
      parameters:
        - name: receiptAdviceId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Receipt Advice document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptAdvice'
        '404':
          $ref: '#/components/responses/ReceiptAdviceNotFound'
  /order-changes:
    get:
      tags:
        - OrderChange
      summary: List all order changes
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of order changes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderChange'
    post:
      tags:
        - OrderChange
      summary: Create an order change
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderChange'
      responses:
        '201':
          description: Order change created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderChange'
        '400':
          $ref: '#/components/responses/BadRequest'
  /order-changes/{id}:
    get:
      tags:
        - OrderChange
      summary: Get an order change by ID
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Order change found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderChange'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - OrderChange
      summary: Update an order change
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderChange'
      responses:
        '200':
          description: Order change updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderChange'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - OrderChange
      summary: Delete an order change
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Order change deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /order-cancellations:
    get:
      tags:
        - OrderCancellation
      summary: List all order cancellations
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of order cancellations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderCancellation'
    post:
      tags:
        - OrderCancellation
      summary: Create an order cancellation
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancellation'
      responses:
        '201':
          description: Order cancellation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancellation'
        '400':
          $ref: '#/components/responses/BadRequest'
  /order-cancellations/{cancellationId}:
    get:
      tags:
        - OrderCancellation
      summary: Get an order cancellation by ID
      parameters:
        - $ref: '#/components/parameters/CancellationId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Order cancellation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancellation'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - OrderCancellation
      summary: Update an order cancellation
      parameters:
        - $ref: '#/components/parameters/CancellationId'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancellation'
      responses:
        '200':
          description: Order cancellation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancellation'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - OrderCancellation
      summary: Delete an order cancellation
      parameters:
        - $ref: '#/components/parameters/CancellationId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Order cancellation deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /fulfilment-cancellations:
    get:
      tags:
        - FulfilmentCancellation
      summary: List all fulfilment cancellations
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: List of fulfilment cancellations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FulfilmentCancellation'
    post:
      tags:
        - FulfilmentCancellation
      summary: Create a fulfilment cancellation
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FulfilmentCancellation'
      responses:
        '201':
          description: Fulfilment cancellation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FulfilmentCancellation'
        '400':
          $ref: '#/components/responses/BadRequest'
  /fulfilment-cancellations/{documentId}:
    get:
      tags:
        - FulfilmentCancellation
      summary: Get a fulfilment cancellation by document ID
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Fulfilment cancellation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FulfilmentCancellation'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - FulfilmentCancellation
      summary: Update a fulfilment cancellation
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FulfilmentCancellation'
      responses:
        '200':
          description: Fulfilment cancellation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FulfilmentCancellation'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - FulfilmentCancellation
      summary: Delete a fulfilment cancellation
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Fulfilment cancellation deleted
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    ClientId:
      name: clientId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: header
      required: true
      schema:
        type: string
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    CancellationId:
      name: cancellationId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ErrorResponse:
      required:
        - error
        - message
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    ClientRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    Client:
      type: object
      properties:
        clientId:
          type: string
        username:
          type: string
        password:
          type: string
          format: password
    SessionRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    Session:
      type: object
      properties:
        sessionId:
          type: string
        clientId:
          type: string
    OrderChange:
      type: object
      properties:
        id:
          type: string
        issueDate:
          type: string
          format: date
        orderReferenceId:
          type: string
        changesMade:
          type: string
        buyer:
          $ref: '#/components/schemas/Party'
        seller:
          $ref: '#/components/schemas/Party'
    OrderCancellation:
      type: object
      properties:
        cancellationId:
          type: string
        documentType:
          type: string
        documentId:
          type: string
        reason:
          type: string
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        cancelledByUserId:
          type: string
        cancelledAt:
          type: string
          format: date-time
    FulfilmentCancellation:
      type: object
      properties:
        receiverId:
          type: string
        submitterId:
          type: string
        documentId:
          type: string
        issueDate:
          type: string
          format: date
        note:
          type: string
        shipment:
          $ref: '#/components/schemas/Shipment'
    DespatchAdviceCreateRequest:
      required:
        - copyIndicator
        - deliveryCustomerParty
        - despatchLines
        - despatchSupplierParty
        - documentID
        - documentStatusCode
        - issueDate
        - orderReference
        - receiverId
        - senderId
        - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchAdviceTypeCode:
          type: string
          default: delivery
        note:
          type: string
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        shipment:
          $ref: '#/components/schemas/Shipment'
        despatchLines:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/DespatchLine'
    ReceiptAdviceCreateRequest:
      required:
        - copyIndicator
        - deliveryCustomerParty
        - despatchSupplierParty
        - documentID
        - documentStatusCode
        - orderReference
        - receiptLines
        - receiverId
        - senderId
        - shipment
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          readOnly: true
        documentID:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        copyIndicator:
          type: boolean
        replaces:
          type: string
        issueDate:
          type: string
          format: date
        documentStatusCode:
          type: string
        note:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
        despatchDocumentReference:
          $ref: '#/components/schemas/DocumentReference'
        deliveryCustomerParty:
          $ref: '#/components/schemas/DeliveryCustomerParty'
        despatchSupplierParty:
          $ref: '#/components/schemas/DespatchSupplierParty'
        shipment:
          $ref: '#/components/schemas/ReceiptAdviceShipment'
        receiptLines:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/ReceiptLine'
    FulfilmentCancellationCreateRequest:
      required:
        - documentId
        - issueDate
        - receiverId
        - shipment
        - submitterId
      type: object
      properties:
        receiverId:
          type: string
        submitterId:
          type: string
        documentId:
          type: string
        issueDate:
          type: string
          format: date
        note:
          type: string
        shipment:
          $ref: '#/components/schemas/Shipment'
    DespatchSupplierParty:
      required:
        - party
      type: object
      properties:
        customerAssignedAccountId:
          type: string
        party:
          $ref: '#/components/schemas/Party'
    DeliveryCustomerParty:
      required:
        - party
      type: object
      properties:
        customerAssignedAccountId:
          type: string
        supplierAssignedAccountId:
          type: string
        party:
          $ref: '#/components/schemas/Party'
    Party:
      required:
        - name
        - postalAddress
      type: object
      properties:
        name:
          type: string
        postalAddress:
          $ref: '#/components/schemas/PostalAddress'
        contact:
          $ref: '#/components/schemas/Contact'
    PostalAddress:
      required:
        - cityName
        - countryIdentificationCode
        - postalZone
        - streetName
      type: object
      properties:
        streetName:
          type: string
        buildingName:
          type: string
        buildingNumber:
          type: string
        cityName:
          type: string
        postalZone:
          type: string
        countrySubentity:
          type: string
        addressLine:
          type: string
        countryIdentificationCode:
          maxLength: 2
          minLength: 2
          type: string
          example: AU
    Contact:
      type: object
      properties:
        name:
          type: string
        telephone:
          type: string
        telefax:
          type: string
        email:
          type: string
    Shipment:
      required:
        - consignmentId
        - delivery
        - id
      type: object
      properties:
        id:
          type: string
        consignmentId:
          type: string
        delivery:
          $ref: '#/components/schemas/Delivery'
    Delivery:
      required:
        - deliveryAddress
        - requestedDeliveryPeriod
      type: object
      properties:
        id:
          type: string
        deliveryAddress:
          $ref: '#/components/schemas/PostalAddress'
        requestedDeliveryPeriod:
          $ref: '#/components/schemas/DeliveryPeriod'
    DeliveryPeriod:
      required:
        - endDate
        - startDate
      type: object
      properties:
        startDate:
          type: string
          format: date
        startTime:
          type: string
        endDate:
          type: string
          format: date
        endTime:
          type: string
    ReceiptAdviceShipment:
      required:
        - consignmentId
        - delivery
        - id
      type: object
      properties:
        id:
          type: string
        consignmentId:
          type: string
        delivery:
          $ref: '#/components/schemas/ReceiptDelivery'
    ReceiptDelivery:
      type: object
      properties:
        id:
          type: string
        quantity:
          type: number
        quantityUnitCode:
          type: string
        actualDeliveryDate:
          type: string
          format: date
        actualDeliveryTime:
          type: string
        requestedDeliveryPeriod:
          $ref: '#/components/schemas/DeliveryPeriod'
    DespatchLine:
      required:
        - deliveredQuantity
        - deliveredQuantityUnitCode
        - id
        - item
        - orderLineReference
      type: object
      properties:
        id:
          type: string
        note:
          type: string
        lineStatusCode:
          type: string
        deliveredQuantity:
          type: number
        deliveredQuantityUnitCode:
          type: string
          example: EA
        backorderQuantity:
          type: number
        backorderQuantityUnitCode:
          type: string
        backorderReason:
          type: string
        orderLineReference:
          $ref: '#/components/schemas/OrderLineReference'
        item:
          $ref: '#/components/schemas/Item'
    ReceiptLine:
      required:
        - id
        - item
        - receivedQuantity
        - receivedQuantityUnitCode
      type: object
      properties:
        id:
          type: string
        note:
          type: string
        receivedQuantity:
          type: number
        receivedQuantityUnitCode:
          type: string
        shortQuantity:
          type: number
        shortQuantityUnitCode:
          type: string
        item:
          $ref: '#/components/schemas/Item'
    OrderLineReference:
      required:
        - lineId
        - orderReference
      type: object
      properties:
        lineId:
          type: string
        salesOrderLineId:
          type: string
        orderReference:
          $ref: '#/components/schemas/OrderReference'
    OrderReference:
      required:
        - id
      type: object
      properties:
        id:
          type: string
        salesOrderId:
          type: string
        uuid:
          type: string
        issueDate:
          type: string
          format: date
    DocumentReference:
      required:
        - id
      type: object
      properties:
        id:
          type: string
        uuid:
          type: string
        issueDate:
          type: string
          format: date
    Item:
      required:
        - description
        - name
      type: object
      properties:
        description:
          type: string
        name:
          type: string
        buyersItemIdentification:
          $ref: '#/components/schemas/ItemIdentification'
        sellersItemIdentification:
          $ref: '#/components/schemas/ItemIdentification'
        itemInstance:
          $ref: '#/components/schemas/ItemInstance'
    ItemIdentification:
      required:
        - id
      type: object
      properties:
        id:
          type: string
    ItemInstance:
      type: object
      properties:
        lotIdentification:
          $ref: '#/components/schemas/LotIdentification'
    LotIdentification:
      type: object
      properties:
        lotNumberId:
          type: string
        expiryDate:
          type: string
          format: date
    DespatchAdviceSummary:
      type: object
      properties:
        documentId:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - DESPATCHED
            - RECEIVED
            - FULFILMENT_CANCELLED
        issueDate:
          type: string
          format: date
        senderId:
          type: string
        receiverId:
          type: string
    DespatchAdvice:
      allOf:
        - $ref: '#/components/schemas/DespatchAdviceCreateRequest'
        - type: object
          required:
            - status
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - DESPATCHED
                - RECEIVED
                - FULFILMENT_CANCELLED
    ReceiptAdvice:
      allOf:
        - $ref: '#/components/schemas/ReceiptAdviceCreateRequest'
        - type: object
          required:
            - uuid
          properties:
            uuid:
              type: string
              format: uuid
    inline_response_200:
      type: object
      properties:
        documentId:
          type: string
        status:
          type: string
